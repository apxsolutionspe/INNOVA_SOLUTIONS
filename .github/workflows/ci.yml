name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Prisma validate
        run: npx prisma validate --schema apps/backend/prisma/schema.prisma
        env:
          DATABASE_URL: postgresql://techcenter_user:innova_password@localhost:5432/innova_solutions?schema=public

      - name: Build
        run: npm run build
