services:
  postgres:
    image: postgres:16-alpine
    container_name: innova-postgres-dev
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-techcenter_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_this_postgres_password}
      POSTGRES_DB: ${POSTGRES_DB:-innova_solutions}
    ports:
      - "${POSTGRES_PORT:-55432}:5432"
    volumes:
      - innova_postgres_data:/var/lib/postgresql/data

volumes:
  innova_postgres_data:
